<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рост сосны</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Убираем прокрутку */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Делаем на весь экран */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://raw.githubusercontent.com/svetlana18011991/sosna/main/%D1%84%D0%BE%D0%BD.png');
            background-size: cover;
            background-position: center bottom;
        }

        /* Контейнер для сосны прижат к низу */
        #tree-wrapper {
            position: absolute;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%; 
            height: 90vh; /* Занимает почти всю высоту */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Все картинки выравниваются по нижнему краю */
            pointer-events: none; /* Чтобы картинка не перекрывала клики по кнопке */
        }

        .tree-img {
            position: absolute;
            max-width: 90vw;
            max-height: 100%;
            transition: opacity 1.5s ease-in-out;
            transform-origin: bottom center;
            bottom: 5%; /* Небольшой отступ от самого низа экрана, отрегулируй если нужно */
        }

        #tree-next {
            opacity: 0;
        }

        /* Анимация неверного ответа (пульсация цветом на месте) */
        @keyframes pulseRed {
            0% { filter: none; transform: scale(1); }
            50% { filter: sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(0.98); }
            100% { filter: none; transform: scale(1); }
        }

        .error-anim {
            animation: pulseRed 1s ease-in-out;
        }

        /* Кнопка Далее */
        #btn-next {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.3s, transform 0.1s;
            z-index: 10;
        }

        #btn-next:hover { background-color: #2ecc71; }
        #btn-next:active { transform: translateX(-50%) scale(0.95); }

        /* Окно с вопросом */
        #question-modal {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            z-index: 20;
            width: 80%;
            max-width: 500px;
        }

        #question-text {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .answer-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            font-size: 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .answer-btn:hover { background: #2980b9; }

        /* Финальный экран */
        #final-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: none;
            z-index: 30;
        }

        #final-text {
            position: absolute;
            top: 20%;
            right: 10%;
            font-family: 'Caveat', cursive;
            font-size: 100px;
            color: #f1c40f;
            text-shadow: 2px 2px 0 #d35400, -1px -1px 0 #d35400, 1px -1px 0 #d35400, -1px 1px 0 #d35400, 3px 3px 10px rgba(0,0,0,0.5);
            transform: rotate(-10deg);
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="tree-wrapper">
        <img id="tree-current" class="tree-img" src="https://raw.githubusercontent.com/svetlana18011991/sosna/main/1.png" alt="Сосна">
        <img id="tree-next" class="tree-img" src="" alt="Сосна рост">
    </div>

    <button id="btn-next">Начать рост!</button>

    <div id="question-modal">
        <div id="question-text">Вопрос?</div>
        <div id="answers-container"></div>
    </div>

    <div id="final-screen">
        <canvas id="fireworks-canvas"></canvas>
        <div id="final-text">Отлично!</div>
    </div>
</div>

<script>
    // Массив вопросов (всего 4 вопроса, чтобы вырастить сосну со стадии 1 до стадии 5)
    const questions = [
        { q: "Сколько будет 7 × 8?", options: ["54", "56", "64"], correct: 1 },
        { q: "Реши уравнение: 2x = 10", options: ["x = 5", "x = 4", "x = 6"], correct: 0 },
        { q: "Площадь квадрата со стороной 4?", options: ["8", "12", "16"], correct: 2 },
        { q: "Корень из 81?", options: ["7", "9", "8"], correct: 1 }
    ];

    let currentQuestionIndex = 0;
    let treeStage = 1; // Начинаем с 1 картинки
    const maxStage = 5;
    
    const btnNext = document.getElementById('btn-next');
    const modal = document.getElementById('question-modal');
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const treeCurrent = document.getElementById('tree-current');
    const treeNext = document.getElementById('tree-next');
    const treeWrapper = document.getElementById('tree-wrapper');
    const finalScreen = document.getElementById('final-screen');

    // Предзагрузка картинок
    const images = [];
    for (let i = 1; i <= maxStage; i++) {
        images[i] = new Image();
        images[i].src = `https://raw.githubusercontent.com/svetlana18011991/sosna/main/${i}.png`;
    }

    btnNext.addEventListener('click', () => {
        if (currentQuestionIndex < questions.length) {
            btnNext.textContent = "Далее";
            showQuestion(currentQuestionIndex);
        }
    });

    function showQuestion(index) {
        btnNext.style.display = 'none';
        modal.style.display = 'block';
        
        const qData = questions[index];
        questionText.textContent = qData.q;
        answersContainer.innerHTML = '';

        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i, qData.correct);
            answersContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, correctIndex) {
        modal.style.display = 'none';
        
        if (selectedIndex === correctIndex) {
            // Верный ответ - сосна растет
            if (treeStage < maxStage) {
                treeStage++;
            }
            growTree(treeStage);
        } else {
            // Неверный ответ - анимация пульсации, сосна НЕ растет
            treeWrapper.classList.remove('error-anim');
            void treeWrapper.offsetWidth; // сброс анимации
            treeWrapper.classList.add('error-anim');
            
            // Ждем завершения анимации (1 сек), затем идем дальше
            setTimeout(() => {
                proceedToNextStep();
            }, 1000);
        }
    }

    function growTree(newStage) {
        treeNext.src = images[newStage].src;
        treeNext.style.opacity = 1;

        setTimeout(() => {
            treeCurrent.src = treeNext.src;
            treeNext.style.opacity = 0; 
            proceedToNextStep();
        }, 1500); // Ждем 1.5 секунды завершения визуального роста
    }

    function proceedToNextStep() {
        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            // Если вопросы еще остались
            btnNext.style.display = 'block';
        } else {
            // Вопросы закончились
            btnNext.style.display = 'none';
            showVictory();
        }
    }

    // Логика фейерверка
    function showVictory() {
        finalScreen.style.display = 'block';
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let startX = canvas.width * 0.8; 
        let startY = canvas.height * 0.5;

        for (let i = 0; i < 120; i++) {
            particles.push({
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 18,
                vy: (Math.random() - 0.5) * 18,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                life: 1
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25; 
                p.life -= 0.015;
                
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) particles.splice(index, 1);
            });
            
            if (particles.length > 0) {
                requestAnimationFrame(animate);
            }
        }
        animate();
    }
</script>

</body>
</html>
