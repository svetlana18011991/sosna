<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рост сосны</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://raw.githubusercontent.com/svetlana18011991/sosna/main/%D1%84%D0%BE%D0%BD.png');
            background-size: cover;
            background-position: center bottom;
        }

        #tree-wrapper {
            position: absolute;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%; 
            height: 90vh; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            pointer-events: none; 
        }

        .tree-img {
            position: absolute;
            max-width: 90vw;
            max-height: 100%;
            transition: opacity 1.5s ease-in-out;
            transform-origin: bottom center;
            bottom: 5%; 
        }

        #tree-next {
            opacity: 0;
        }

        @keyframes pulseRed {
            0% { filter: none; transform: translateX(-50%) scale(1); }
            50% { filter: sepia(1) hue-rotate(-50deg) saturate(5); transform: translateX(-50%) scale(0.98); }
            100% { filter: none; transform: translateX(-50%) scale(1); }
        }

        .error-anim {
            animation: pulseRed 1s ease-in-out;
        }

        #btn-next {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.3s, transform 0.1s;
            z-index: 10;
        }

        #btn-next:hover { background-color: #2ecc71; }
        #btn-next:active { transform: translateX(-50%) scale(0.95); }

        /* УВЕЛИЧЕННАЯ ПЛАШКА */
        #question-modal {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-image: url('https://raw.githubusercontent.com/svetlana18011991/sosna/main/6.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent; 
            
            /* Настроил отступы пропорционально новому размеру */
            padding: 80px 100px 90px 100px; 
            box-sizing: border-box;
            
            text-align: center;
            display: none;
            z-index: 20;
            width: 95%; /* Занимает больше ширины экрана */
            max-width: 800px; /* Раньше было 600px, теперь плашка шире */
            min-height: 450px; /* Раньше было 350px, теперь она выше */
        }

        #question-text {
            font-size: 24px;
            margin-bottom: 20px;
            color: #3e2723; 
            font-weight: bold;
            line-height: 1.3; /* Добавил межстрочный интервал для длинных вопросов */
        }

        .answer-btn {
            display: block;
            width: 90%; /* Кнопки тоже стали чуть шире внутри плашки */
            margin: 12px auto; 
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #558b2f; 
            color: white;
            border: 2px solid #33691e; 
            border-radius: 15px; 
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
        }

        .answer-btn:hover { 
            background: #7cb342; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }

        #final-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: none;
            z-index: 30;
        }

        #final-text {
            position: absolute;
            top: 20%;
            right: 10%;
            font-family: 'Caveat', cursive;
            font-size: 100px;
            color: #f1c40f;
            text-shadow: 2px 2px 0 #d35400, -1px -1px 0 #d35400, 1px -1px 0 #d35400, -1px 1px 0 #d35400, 3px 3px 10px rgba(0,0,0,0.5);
            transform: rotate(-10deg);
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="tree-wrapper">
        <img id="tree-current" class="tree-img" src="https://raw.githubusercontent.com/svetlana18011991/sosna/main/1.png" alt="Сосна">
        <img id="tree-next" class="tree-img" src="" alt="Сосна рост">
    </div>

    <button id="btn-next">Начать рост!</button>

    <div id="question-modal">
        <div id="question-text">Вопрос?</div>
        <div id="answers-container"></div>
    </div>

    <div id="final-screen">
        <canvas id="fireworks-canvas"></canvas>
        <div id="final-text">Отлично!</div>
    </div>
</div>

<script>
    const questions = [
        { q: "Что заставляет сосновую шишку закрывать свои чешуйки?", options: ["Холодный ветер", "Повышенная влажность", "Темнота"], correct: 1 },
        { q: "Зачем шишка плотно закрывается перед дождем?", options: ["Чтобы сохранить свои семена", "Чтобы не замерзнуть", "Чтобы спрятаться от птиц"], correct: 0 },
        { q: "Как называется наука, которая изучает природу для создания новых технологий?", options: ["Ботаника", "Экология", "Бионика"], correct: 2 },
        { q: "Сколько лет может прожить сосна?", options: ["Около 10 лет", "От 100 до 600 лет", "Больше 1000 лет"], correct: 1 }
    ];

    let currentQuestionIndex = 0;
    let treeStage = 1; 
    const maxStage = 5;
    
    const btnNext = document.getElementById('btn-next');
    const modal = document.getElementById('question-modal');
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const treeCurrent = document.getElementById('tree-current');
    const treeNext = document.getElementById('tree-next');
    const treeWrapper = document.getElementById('tree-wrapper');
    const finalScreen = document.getElementById('final-screen');

    const images = [];
    for (let i = 1; i <= maxStage; i++) {
        images[i] = new Image();
        images[i].src = `https://raw.githubusercontent.com/svetlana18011991/sosna/main/${i}.png`;
    }

    btnNext.addEventListener('click', () => {
        if (currentQuestionIndex < questions.length) {
            btnNext.textContent = "Далее";
            showQuestion(currentQuestionIndex);
        }
    });

    function showQuestion(index) {
        btnNext.style.display = 'none';
        modal.style.display = 'block';
        
        const qData = questions[index];
        questionText.textContent = qData.q;
        answersContainer.innerHTML = '';

        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i, qData.correct);
            answersContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, correctIndex) {
        modal.style.display = 'none';
        
        if (selectedIndex === correctIndex) {
            if (treeStage < maxStage) {
                treeStage++;
            }
            growTree(treeStage);
        } else {
            treeWrapper.classList.remove('error-anim');
            void treeWrapper.offsetWidth; 
            treeWrapper.classList.add('error-anim');
            
            setTimeout(() => {
                proceedToNextStep();
            }, 1000);
        }
    }

    function growTree(newStage) {
        treeNext.src = images[newStage].src;
        treeNext.style.opacity = 1;

        setTimeout(() => {
            treeCurrent.src = treeNext.src;
            treeNext.style.opacity = 0; 
            proceedToNextStep();
        }, 1500); 
    }

    function proceedToNextStep() {
        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            btnNext.style.display = 'block';
        } else {
            btnNext.style.display = 'none';
            showVictory();
        }
    }

    function showVictory() {
        finalScreen.style.display = 'block';
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let startX = canvas.width * 0.8; 
        let startY = canvas.height * 0.5;

        for (let i = 0; i < 120; i++) {
            particles.push({
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 18,
                vy: (Math.random() - 0.5) * 18,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                life: 1
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25; 
                p.life -= 0.015;
                
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) particles.splice(index, 1);
            });
            
            if (particles.length > 0) {
                requestAnimationFrame(animate);
            }
        }
        animate();
    }
</script>

</body>
</html>
